<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Librarian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen text-white flex flex-col">

<!-- Navbar -->
<nav class="bg-gray-800 p-4 shadow-lg border-b border-gray-700">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-400"><i class="fas fa-robot mr-2"></i>AI Librarian</h1>
        <a href="/" class="text-gray-300 hover:text-white">Înapoi la Bibliotecă</a>
    </div>
</nav>

<!-- Chat Container -->
<div class="flex-grow container mx-auto p-4 flex flex-col max-w-4xl">

    <!-- Messages Area -->
    <div id="chat-box" class="flex-grow bg-gray-800 rounded-lg p-6 overflow-y-auto mb-4 border border-gray-700 shadow-inner h-96">
        <!-- Mesaj introductiv -->
        <div class="flex items-start mb-4">
            <div class="bg-blue-600 p-3 rounded-lg rounded-tl-none max-w-lg">
                <p class="text-sm">Salut! Sunt asistentul bibliotecii tale. Am citit toate rezumatele. Întreabă-mă orice!</p>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="bg-gray-800 p-4 rounded-lg flex items-center gap-4 border border-gray-700">
        <input id="user-input" type="text"
               class="flex-grow bg-gray-700 text-white border-none rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"
               placeholder="Ex: Recomandă-mi o carte tristă..."
               onkeypress="if(event.key === 'Enter') sendMessage()">

        <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-lg transition">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    const CHAT_URL = 'http://localhost:8080/api/ai/chat';
    const AUTH_HEADER = 'Basic ' + btoa('student:password'); // User normal credentials

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value.trim();
        if (!message) return;

        // 1. Adaugă mesajul userului în UI
        addMessage(message, 'user');
        inputField.value = '';

        // 2. Loading indicator
        const loadingId = addMessage('Thinking...', 'ai', true);

        try {
            // 3. Call AI Service via Gateway
            const response = await fetch(`${CHAT_URL}?query=${encodeURIComponent(message)}`, {
                headers: { 'Authorization': AUTH_HEADER }
            });

            const aiReply = await response.text();

            // 4. Update UI
            removeMessage(loadingId);
            addMessage(aiReply, 'ai');

        } catch (e) {
            removeMessage(loadingId);
            addMessage("Eroare: Nu pot contacta AI-ul.", 'ai');
        }
    }

    function addMessage(text, sender, isLoading = false) {
        const chatBox = document.getElementById('chat-box');
        const isUser = sender === 'user';
        const msgId = 'msg-' + Date.now();

        const html = `
            <div id="${msgId}" class="flex items-start mb-4 ${isUser ? 'justify-end' : ''}">
                <div class="${isUser ? 'bg-green-600 rounded-tr-none' : 'bg-blue-600 rounded-tl-none'} p-3 rounded-lg max-w-lg shadow-md ${isLoading ? 'animate-pulse' : ''}">
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            </div>
        `;

        chatBox.insertAdjacentHTML('beforeend', html);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgId;
    }

    function removeMessage(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }
</script>

</body>
</html>
