server:
  port: 8081 # Port diferit de 8080 (care va fi Gateway)

spring:
  application:
    name: library-service
  datasource:
    url: jdbc:postgresql://localhost:5432/library_db
    username: admin
    password: password123
  jpa:
    hibernate:
      ddl-auto: update # Va crea tabelele automat
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/