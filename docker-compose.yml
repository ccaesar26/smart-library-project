# version: '3.8'
services:
  # 1. Baza de date relațională (pentru Library Service)
  database:
    image: pgvector/pgvector:pg16 
    container_name: smart_library_db
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  chroma_data: